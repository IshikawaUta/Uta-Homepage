{% extends "admin/base.html" %}
{% block title %}Login - Admin CMS{% endblock %}
{% block content %}
<div class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
      <div class="mb-6 text-center">
        <h1 class="text-xl font-semibold text-gray-900">Admin Login</h1>
        <p class="mt-1 text-sm text-gray-500">Masuk ke dashboard CMS</p>
      </div>

      {% if error %}
      <div class="mb-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/admin/login" class="space-y-4">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
          <input
            type="text"
            name="username"
            id="username"
            required
            autocomplete="username"
            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
          >
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            required
            autocomplete="current-password"
            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
          >
        </div>
        <button
          type="submit"
          class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
        >
          Masuk
        </button>
      </form>
    </div>
    <p class="mt-4 text-center text-xs text-gray-400">
      <a href="/" class="underline hover:text-gray-600">Kembali ke portfolio</a>
    </p>
  </div>
</div>
{% endblock %}
